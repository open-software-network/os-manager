manager:
  login: acme-manager-bot

models:
  triage:
    provider: claude-code
    model: fable
  plan:
    provider: claude-code
    model: fable
  review:
    provider: claude-code
    model: sonnet
  meta_review:
    provider: claude-code
    model: fable

poll:
  interval_seconds: 60

policies:
  triage_prompt: ""
  max_review_rounds: 3
  max_meta_rounds: 2
  stale_after_hours: 48

budgets:
  per_task_usd: 5
  daily_usd: 100

merge:
  method: squash
  auto_merge_on_approve: true

escalation:
  mention:
    - "@junhohong"

labels:
  prefix: osm
